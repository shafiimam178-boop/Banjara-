<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banjara Kitchen Products</title>
<style>
/* ==== Reset & Basic Styles ==== */
body {margin:0; font-family: Arial, sans-serif; background:#f9f9f9; color:#333;}
a {text-decoration:none; color:inherit;}
img {max-width:100%; display:block;}

/* ==== Header ==== */
header {background:#8B0000; color:#fff; padding:20px 0; text-align:center;}
header h1 {margin:0; font-size:2em; letter-spacing:2px;}

/* ==== Product Grid ==== */
.products {display:grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap:20px; padding:40px;}
.product-card {background:#fff; border-radius:12px; box-shadow:0 4px 8px rgba(0,0,0,0.1); overflow:hidden; text-align:center; transition: transform 0.2s;}
.product-card:hover {transform: translateY(-5px);}
.product-card img {width:100%; height:200px; object-fit: cover;}
.product-card h2 {margin:15px 0 5px; font-size:1.2em; color:#8B0000;}
.product-card p {margin:0 0 15px; font-weight:bold; font-size:1em; color:#555;}

/* ==== Footer ==== */
footer {background:#333; color:#fff; text-align:center; padding:15px 0;}
</style>
</head>
<body>

<header>
  <h1>Banjara Kitchen Products</h1>
</header>

<section class="products">
  <!-- Product 1 -->
  <div class="product-card">
    <img src="woodstove.png.jpg" alt="Wood Stove">
    <h2>Wood Stove</h2>
    <p>₹1700</p>
  </div>

  <!-- Product 2 -->
  <div class="product-card">
    <img src="apexstove.png.jpg" alt="Apex Stove">
    <h2>Apex Stove</h2>
    <p>₹2200</p>
  </div>
</section>

<footer>
  &copy; 2026 Banjara. All Rights Reserved.
</footer>

</body>
</html>
